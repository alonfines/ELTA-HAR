seed: 42
subset: [1, 2, 4, 13, 19, 22, 23, 27]

# Data paths
inertial_dir: Inertial
kalman_cache: outputs/pose_cache_kalman22
checkpoint_dir: checkpoints/fusion

# Modality-specific feature extraction
feature_type: raw+velocity           # for sensor
landmark_set: hands_legs_hips        # for video
normalization_type: global           # both modalities

# Sequence lengths (must match training modality configs for distribution consistency)
max_len_sensor: 256      # matches sensor.yaml
max_len_video: 256       # matches video.yaml 

# Input dimensions
in_dim_sensor: 12        # 6 IMU + 6 velocity
in_dim_video: 98         # 48 landmarks × 2 + 2 wrist deltas

# Model architecture
model:
  d_model: 64
  n_heads: 4
  n_layers: 2
  dropout: 0.3
  d_fusion: 64           # hidden dim for fusion MLP

training:
  n_epochs: 80
  lr: 1.0e-3
  weight_decay: 1.0e-3
  batch_size: 16
  grad_clip: 1.0

# Class imbalance experiment (Part 5)
imbalance_target_actions: [19, 22]  # Knock on door, jogging
imbalance_ratio: 0.25

# Augmentation parameters for --augment_minority flag
augmentation:
  # Sensor (IMU) augmentation
  amplitude_scale_range: [0.8, 1.2]      # Scale factor for amplitude scaling
  time_warp_sigma: 0.15                  # Time warping smoothness
  # Video (Pose) augmentation
  landmark_rotation_range: 5.0            # Degrees (±5°)
  landmark_scale_range: [0.9, 1.1]       # Scale factor range

wandb:
  project: ELTA-HAR
  group: fusion_loso

# Conformal prediction (Part 6)
conformal:
  alpha: 0
